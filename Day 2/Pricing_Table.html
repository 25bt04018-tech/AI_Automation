<!DOCTYPE html>
<html>
<head>
    <title>Pricing Table</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 40px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 250px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #333;
        }

        .price {
            font-size: 30px;
            color: #007bff;
            margin: 15px 0;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        ul li {
            margin: 10px 0;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

    <h1>Pricing Plans</h1>

    <div class="container">

        <div class="card">
            <h2>Basic</h2>
            <div class="price">$10/month</div>
            <ul>
                <li>1 User</li>
                <li>5 GB Storage</li>
                <li>Email Support</li>
            </ul>
            <button>Select</button>
        </div>

        <div class="card">
            <h2>Pro</h2>
            <div class="price">$25/month</div>
            <ul>
                <li>5 Users</li>
                <li>50 GB Storage</li>
                <li>Priority Support</li>
            </ul>
            <button>Select</button>
        </div>

        <div class="card">
            <h2>Enterprise</h2>
            <div class="price">$50/month</div>
            <ul>
                <li>Unlimited Users</li>
                <li>500 GB Storage</li>
                <li>24/7 Support</li>
            </ul>
            <button>Select</button>
        </div>

    </div>

</body>
</html>
