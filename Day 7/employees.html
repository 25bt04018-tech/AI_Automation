<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Directory</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0d0d0f;
      --surface:   #16161a;
      --border:    #2a2a32;
      --accent:    #c8f135;
      --accent2:   #7b61ff;
      --text:      #eeeef0;
      --muted:     #6b6b7a;
      --row-hover: #1e1e26;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 860px;
    }

    header {
      margin-bottom: 36px;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* Table container */
    .table-container {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 0 0 1px rgba(200,241,53,0.06), 0 24px 64px rgba(0,0,0,0.5);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: linear-gradient(90deg, #1a1a22 0%, #18181f 100%);
      border-bottom: 1px solid var(--border);
    }

    thead th {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 18px 24px;
      text-align: left;
    }

    thead th:last-child { text-align: right; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.18s ease;
      opacity: 0;
      transform: translateY(10px);
      animation: rowIn 0.4s forwards;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--row-hover); }

    @keyframes rowIn {
      to { opacity: 1; transform: translateY(0); }
    }

    tbody td {
      padding: 20px 24px;
      font-size: 14px;
      vertical-align: middle;
    }

    /* EmpId chip */
    .chip-id {
      display: inline-block;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      color: var(--accent);
      background: rgba(200,241,53,0.08);
      border: 1px solid rgba(200,241,53,0.2);
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    /* Name */
    .name-cell {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
    }

    /* Department badge */
    .dept-badge {
      display: inline-block;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 6px;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .dept-Engineering  { background: rgba(123,97,255,0.15); color: #a594ff; border: 1px solid rgba(123,97,255,0.25); }
    .dept-Product      { background: rgba(56,189,248,0.12); color: #67d3f9; border: 1px solid rgba(56,189,248,0.22); }
    .dept-Design       { background: rgba(249,115,22,0.12); color: #fca773; border: 1px solid rgba(249,115,22,0.22); }
    .dept-Marketing    { background: rgba(236,72,153,0.12); color: #f48abf; border: 1px solid rgba(236,72,153,0.22); }
    .dept-Finance      { background: rgba(34,197,94,0.12);  color: #6ee0a0; border: 1px solid rgba(34,197,94,0.22); }

    /* Salary */
    .salary-cell {
      text-align: right;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .salary-cell .currency {
      color: var(--muted);
      font-size: 11px;
      margin-right: 2px;
    }

    /* Footer stat bar */
    .stat-bar {
      display: flex;
      justify-content: space-between;
      padding: 16px 24px;
      background: #111114;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .stat-bar span b {
      color: var(--accent);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <p class="eyebrow">// internal records</p>
      <h1>Employee <span>Directory</span></h1>
      <p class="subtitle">Rendered via DOM manipulation — no frameworks.</p>
    </header>

    <div class="table-container" id="tableContainer"></div>
  </div>

  <script>
    const employees = [
      { empId: "EMP-001", name: "Priya Sharma",   department: "Engineering", salary: 95000 },
      { empId: "EMP-002", name: "Marcus Chen",     department: "Product",     salary: 88000 },
      { empId: "EMP-003", name: "Aisha Patel",     department: "Design",      salary: 82000 },
      { empId: "EMP-004", name: "Jordan Rivera",   department: "Marketing",   salary: 74000 },
      { empId: "EMP-005", name: "Lena Müller",     department: "Finance",     salary: 91000 }
    ];

    function formatSalary(amount) {
      return amount.toLocaleString('en-US');
    }

    function buildTable(data) {
      const container = document.getElementById('tableContainer');

      // ── Table
      const table = document.createElement('table');

      // ── THEAD
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      ['Emp ID', 'Name', 'Department', 'Salary'].forEach(label => {
        const th = document.createElement('th');
        th.textContent = label;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      // ── TBODY
      const tbody = document.createElement('tbody');
      data.forEach((emp, index) => {
        const tr = document.createElement('tr');
        tr.style.animationDelay = `${index * 80}ms`;

        // Emp ID
        const tdId = document.createElement('td');
        const chip = document.createElement('span');
        chip.className = 'chip-id';
        chip.textContent = emp.empId;
        tdId.appendChild(chip);

        // Name
        const tdName = document.createElement('td');
        tdName.className = 'name-cell';
        tdName.textContent = emp.name;

        // Department
        const tdDept = document.createElement('td');
        const badge = document.createElement('span');
        badge.className = `dept-badge dept-${emp.department}`;
        badge.textContent = emp.department;
        tdDept.appendChild(badge);

        // Salary
        const tdSalary = document.createElement('td');
        tdSalary.className = 'salary-cell';
        const currency = document.createElement('span');
        currency.className = 'currency';
        currency.textContent = 'USD';
        const amount = document.createTextNode(' ' + formatSalary(emp.salary));
        tdSalary.appendChild(currency);
        tdSalary.appendChild(amount);

        tr.append(tdId, tdName, tdDept, tdSalary);
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      container.appendChild(table);

      // ── Stat bar
      const total = data.reduce((sum, e) => sum + e.salary, 0);
      const avg   = Math.round(total / data.length);
      const statBar = document.createElement('div');
      statBar.className = 'stat-bar';
      statBar.innerHTML = `
        <span>TOTAL EMPLOYEES: <b>${data.length}</b></span>
        <span>AVG SALARY: <b>$${formatSalary(avg)}</b></span>
        <span>TOTAL PAYROLL: <b>$${formatSalary(total)}</b></span>
      `;
      container.appendChild(statBar);
    }

    buildTable(employees);
  </script>
</body>
</html>
